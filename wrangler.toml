name = "time2meet-local"
main = "src/index.ts"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]

[assets]
directory = "./public"
binding = "ASSETS"

# Two real environments — both deploy through Cloudflare Workers Builds.
# Secrets (DB_URL, DB_AUTH_TOKEN, COOKIE_SECRET) are configured per-env
# in the Cloudflare dashboard. Nothing on disk, nothing in GitHub.

[env.preview]
name = "time2meet-preview"

[env.preview.assets]
directory = "./public"
binding = "ASSETS"

[env.production]
name = "time2meet"

[env.production.assets]
directory = "./public"
binding = "ASSETS"
